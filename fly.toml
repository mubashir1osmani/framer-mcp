app = "framer-mcp"
primary_region = "sjc"

[build]

# This server is stateful: it holds the Framer plugin's WebSocket connection and
# per-session MCP state in memory, so it MUST run as a SINGLE machine. With more
# than one machine, MCP requests round-robin to machines that have neither the
# session nor the plugin socket (causing 400/403 failures).
# After deploying, pin the count: `fly scale count 1`.
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
